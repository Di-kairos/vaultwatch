name: ci
on: [push, pull_request]
jobs:
  test:
    # Linux-раннер: бесплатные минуты в GitHub Free. vaultwatch 3a — чистая
    # логика (shellcheck + vendor-check + bats), macOS/hdiutil пока не нужен.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y bats shellcheck
      - name: Lint
        run: shellcheck vaultwatch tools/vendor-common.sh
      - name: Vendored common is in sync with pinned securetrash
        run: ./tools/vendor-common.sh --check
      - name: Unit tests
        run: bats test/

  windows:
    # Windows-порт (PowerShell, BETA): vaultwatch трогает Search/Task Scheduler/BitLocker/VSS,
    # поэтому Pester проверяет оркестровку (state, TTL-планирование, restore, hooks) с
    # замоканными системными примитивами.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Pester 5
        shell: pwsh
        run: Install-Module Pester -Scope CurrentUser -Force -SkipPublisherCheck -MinimumVersion 5.0.0
      - name: Pester (vaultwatch.ps1 orchestration + installer integrity gate)
        shell: pwsh
        run: |
          $r = Invoke-Pester windows/test -Output Detailed -PassThru
          if ($r.FailedCount -gt 0) { throw "$($r.FailedCount) Pester test(s) failed" }
